spring:
  application:
    name: secureauth-backend
    admin:
      enabled: false
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/secureauth}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000
      pool-name: SecureAuthHikariPool
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  jmx:
    enabled: false
  devtools:
    restart:
      enabled: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

# Security Configuration
security:
  max-login-attempts: 3
  account-lock-duration: 900000  # 15 minutes en ms

# Server Configuration
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  error:
    include-message: always
    include-binding-errors: always

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Logging
logging:
  level:
    com.secureauth: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# Email Configuration (Gmail SMTP)
spring.mail:
  host: ${SPRING_MAIL_HOST:smtp.gmail.com}
  port: ${SPRING_MAIL_PORT:587}
  username: ${SPRING_MAIL_USERNAME:}
  password: ${SPRING_MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# Application Configuration
app:
  name: SecureAuth+
  url: ${APP_URL:http://localhost:5173}
  mail:
    from: ${SPRING_MAIL_USERNAME:noreply@secureauth.com}
    from-name: SecureAuth+ Security Team